name: Rapid Aid 3.0 CI/CD Production Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-value: '20'
          cache: 'npm'
          cache-dependency-path: rapid_aid_backend/package-lock.json

      - name: Install dependencies
        run: |
          cd rapid_aid_backend
          npm ci

      - name: Run Jest test suites
        run: |
          cd rapid_aid_backend
          npm test

  build-and-push:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to DockerHub registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./rapid_aid_backend
          file: ./rapid_aid_backend/enterprise/Dockerfile
          push: true
          tags: munnashaheem96/rapid-aid-backend:latest
